name: super_health
description: >
  SuperHealth — AfterArtificial Super App for personal health management.
  Powered by After Framework. Built by Overstein Labs.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  after_ai:
    path: ../supercore/packages/after_ai
  after_consumer:
    path: ../supercore/packages/after_consumer
  after_ecosystem:
    path: ../supercore/packages/after_ecosystem
  after_core:
    path: ../supercore/packages/after_core
  after_firebase:
    path: ../supercore/packages/after_firebase
  after_design_system:
    path: ../supercore/packages/after_design_system
  connectivity_plus: ^6.1.4
  cupertino_icons: ^1.0.8
  dio: ^5.10.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  flutter_secure_storage: ^9.2.4
  intl: ^0.20.2
  riverpod: any
  shared_preferences: ^2.5.5
  uuid: ^4.5.1

dev_dependencies:
  very_good_analysis: ^10.3.0
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/l10n/
    - assets/config/
    - assets/branding/
    - assets/data/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/super_health_monogram_store.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/branding/super_health_monogram_foreground.png
  adaptive_icon_foreground_inset: 10
  min_sdk_android: 21
  remove_alpha_ios: true
